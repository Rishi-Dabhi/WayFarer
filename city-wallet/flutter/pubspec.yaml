name: city_wallet
description: WayFarer — AI-powered urban coupon discovery
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^12.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # State
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
