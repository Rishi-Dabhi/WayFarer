name: city_wallet
description: City Wallet - AI-powered urban coupon discovery
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^14.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  path_provider: ^2.1.4
  flutter_stripe: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
